<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SANF🔞RA — تسجيل الدخول</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes bgPulse {
      0%   { transform: scale(1.0);   filter: brightness(0.35) saturate(1.4); }
      50%  { transform: scale(1.08);  filter: brightness(0.42) saturate(1.8); }
      100% { transform: scale(1.0);   filter: brightness(0.35) saturate(1.4); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(192, 38, 211, 0.4), 0 0 60px rgba(192, 38, 211, 0.15); }
      50%       { box-shadow: 0 0 40px rgba(192, 38, 211, 0.8), 0 0 100px rgba(192, 38, 211, 0.3); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }

    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f0e6ff;
      direction: rtl;
      overflow: hidden;
      position: relative;
    }

    .bg-layer {
      position: fixed; inset: 0; z-index: 0;
      background-image: url('https://i.postimg.cc/XNBtYC10/file-0000000084487246995745f704ea604f.png');
      background-size: cover;
      background-position: center;
      animation: bgPulse 8s ease-in-out infinite;
    }
    .bg-overlay {
      position: fixed; inset: 0; z-index: 1;
      background: radial-gradient(ellipse at 50% 0%, rgba(192,38,211,0.18) 0%, transparent 70%),
                  linear-gradient(180deg, rgba(10,0,20,0.7) 0%, rgba(5,0,15,0.85) 100%);
    }

    .login-card {
      position: relative; z-index: 10;
      background: rgba(20, 5, 35, 0.75);
      border: 1px solid rgba(192, 38, 211, 0.4);
      border-radius: 24px;
      padding: 52px 44px;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(24px);
      animation: fadeUp 0.8s ease forwards, glowPulse 4s ease-in-out infinite;
    }

    .logo {
      font-size: 2rem;
      font-weight: 900;
      text-align: center;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #f0abfc, #e879f9, #c026d3, #a21caf);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
    }
    .subtitle {
      text-align: center;
      color: rgba(240,230,255,0.55);
      font-size: 0.88rem;
      margin-bottom: 38px;
      letter-spacing: 0.02em;
    }

    label {
      display: block;
      font-size: 0.82rem;
      color: rgba(240,230,255,0.6);
      margin-bottom: 6px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    input {
      width: 100%;
      padding: 13px 18px;
      border-radius: 12px;
      border: 1px solid rgba(192, 38, 211, 0.3);
      background: rgba(192, 38, 211, 0.07);
      color: #f0e6ff;
      font-size: 0.95rem;
      outline: none;
      margin-bottom: 22px;
      font-family: inherit;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    input:focus {
      border-color: #c026d3;
      box-shadow: 0 0 0 3px rgba(192, 38, 211, 0.2);
    }
    input::placeholder { color: rgba(240,230,255,0.3); }

    .btn-login {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #a21caf, #c026d3, #86198f);
      background-size: 200% auto;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s, background-position 0.4s;
      font-family: inherit;
      letter-spacing: 0.03em;
    }
    .btn-login:hover {
      background-position: right center;
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(192, 38, 211, 0.55);
    }
    .btn-login:active { transform: translateY(0); }

    .error-msg {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.35);
      color: #fca5a5;
      padding: 13px 16px;
      border-radius: 10px;
      margin-bottom: 22px;
      font-size: 0.875rem;
      text-align: center;
    }

    .particles {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: rgba(240, 171, 252, 0.6);
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="bg-layer"></div>
  <div class="bg-overlay"></div>

  <div class="particles" id="particles"></div>

  <div class="login-card">
    <div class="logo">SANF🔞RA</div>
    <div class="subtitle">💭!! لوحة التحكم — سجّلي الدخول</div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <label for="username">اسم المستخدم</label>
      <input type="text" id="username" name="username"
             placeholder="أدخل اسم المستخدم" required autocomplete="username">

      <label for="password">كلمة المرور</label>
      <input type="password" id="password" name="password"
             placeholder="أدخل كلمة المرور" required autocomplete="current-password">

      <button type="submit" class="btn-login">🔐 تسجيل الدخول</button>
    </form>
  </div>

  <script>
    const container = document.getElementById('particles');
    for (let i = 0; i < 35; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.cssText = `
        left: ${Math.random() * 100}%;
        width: ${Math.random() * 4 + 1}px;
        height: ${Math.random() * 4 + 1}px;
        animation-duration: ${Math.random() * 12 + 8}s;
        animation-delay: ${Math.random() * 10}s;
        opacity: ${Math.random() * 0.7 + 0.2};
        background: hsl(${Math.random() * 60 + 280}, 80%, 75%);
      `;
      container.appendChild(p);
    }
  </script>
</body>
</html>
