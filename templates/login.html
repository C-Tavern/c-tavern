<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8b5cf6">
  <title>SANFFOURA — تسجيل الدخول</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32x32.png">
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .login-wrapper {
      width: 100%;
      max-width: 450px;
      animation: slideInUp 0.6s ease-out;
    }

    .login-card {
      background: rgba(20, 28, 50, 0.5);
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 24px;
      padding: 3rem 2rem;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 64px rgba(0, 0, 0, 0.5), 0 0 40px rgba(139, 92, 246, 0.2);
      animation: fadeInUp 0.8s ease-out;
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-logo {
      font-size: 2.5rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, #a78bfa, #ec4899, #8b5cf6);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
      margin-bottom: 0.5rem;
    }

    .login-title {
      font-size: 0.95rem;
      color: rgba(148, 163, 184, 0.9);
      letter-spacing: 0.03em;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-field label {
      font-size: 0.8rem;
      font-weight: 700;
      color: rgb(203, 213, 225);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .form-field input {
      width: 100%;
      padding: 1rem;
      border-radius: 14px;
      border: 1px solid rgba(139, 92, 246, 0.2);
      background: rgba(139, 92, 246, 0.05);
      color: rgb(248, 250, 252);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .form-field input:focus {
      border-color: rgba(139, 92, 246, 0.5);
      background: rgba(139, 92, 246, 0.1);
      box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1), 0 0 20px rgba(139, 92, 246, 0.2);
    }

    .form-field input::placeholder {
      color: rgba(148, 163, 184, 0.5);
    }

    .btn-login {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      letter-spacing: 0.03em;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(139, 92, 246, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(45deg, transparent 30%, rgba(255, 255, 255, 0.1) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.6s;
    }

    .btn-login:hover {
      box-shadow: 0 12px 32px rgba(139, 92, 246, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }

    .btn-login:hover::before {
      transform: translateX(100%);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: rgb(252, 165, 165);
      padding: 1rem;
      border-radius: 12px;
      font-size: 0.9rem;
      text-align: center;
      animation: slideInDown 0.3s ease-out;
    }

    @keyframes slideInDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .login-footer {
      text-align: center;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(139, 92, 246, 0.1);
      font-size: 0.8rem;
      color: rgba(148, 163, 184, 0.7);
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 2rem 1.5rem;
      }

      .login-logo {
        font-size: 2rem;
      }

      .btn-login {
        padding: 0.875rem;
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <div class="bg-layer"></div>
  <div class="bg-overlay"></div>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">SANF🔞RA</div>
        <div class="login-title">💭!! — لوحة التحكم</div>
      </div>

      {% if error %}
      <div class="error-msg">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/login" class="login-form">
        <div class="form-field">
          <label for="username">اسم المستخدم</label>
          <input 
            type="text" 
            id="username" 
            name="username"
            placeholder="أدخل اسم المستخدم" 
            required 
            autocomplete="username"
            autofocus
          >
        </div>

        <div class="form-field">
          <label for="password">كلمة المرور</label>
          <input 
            type="password" 
            id="password" 
            name="password"
            placeholder="أدخل كلمة المرور" 
            required 
            autocomplete="current-password"
          >
        </div>

        <button type="submit" class="btn-login">🔐 تسجيل الدخول</button>
      </form>

      <div class="login-footer">
        <p>🔞 SANFFOURA — رفيقتك الذكية على مدار الساعة</p>
      </div>
    </div>
  </div>

  <script>
    /* PWA Service Worker Registration */
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then(reg => console.log('[PWA] SW registered:', reg.scope))
          .catch(err => console.warn('[PWA] SW failed:', err));
      });
    }

    /* Form validation and submission */
    const form = document.querySelector('.login-form');
    const submitBtn = form.querySelector('button[type="submit"]');

    form.addEventListener('submit', function(e) {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!username || !password) {
        e.preventDefault();
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span> جاري التحقق...';
    });

    /* Auto-focus management */
    document.addEventListener('DOMContentLoaded', () => {
      const usernameInput = document.getElementById('username');
      if (usernameInput) usernameInput.focus();
    });
  </script>
</body>
</html>
