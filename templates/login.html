<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>كلافو — تسجيل الدخول</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1030 50%, #0d1a2e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e5e7eb;
      direction: rtl;
    }
    .login-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .logo { font-size: 2.2rem; font-weight: 700; color: #a78bfa; text-align: center; margin-bottom: 8px; }
    .subtitle { text-align: center; color: #9ca3af; font-size: 0.9rem; margin-bottom: 36px; }
    label { display: block; font-size: 0.85rem; color: #9ca3af; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: #e5e7eb;
      font-size: 0.95rem;
      outline: none;
      margin-bottom: 20px;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #a78bfa; }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-family: inherit;
    }
    .btn-login:hover { background: #6d28d9; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }
    .error-msg {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 0.875rem;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="login-card">
  <div class="logo">🤖 كلافو</div>
  <div class="subtitle">لوحة تحكم المشرف — يرجى تسجيل الدخول</div>

  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/login">
    <label for="username">اسم المستخدم</label>
    <input type="text" id="username" name="username" placeholder="أدخل اسم المستخدم" required autocomplete="username">

    <label for="password">كلمة المرور</label>
    <input type="password" id="password" name="password" placeholder="أدخل كلمة المرور" required autocomplete="current-password">

    <button type="submit" class="btn-login">🔐 تسجيل الدخول</button>
  </form>
</div>
</body>
</html>
